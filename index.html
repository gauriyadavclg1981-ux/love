<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rimjhim ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    color: white;
    overflow: hidden;
}

.container {
    position: relative;
    top: 15%;
}

h1 {
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px white;}
    to {text-shadow: 0 0 30px yellow;}
}

#typeText {
    font-size: 1.4em;
    margin-top: 10px;
    border-right: 2px solid white;
    display: inline-block;
    padding-right: 5px;
    white-space: nowrap;
    overflow: hidden;
}

/* Personal message */
#personalMsg {
    margin-top: 20px;
    font-size: 1.3em;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
}

/* Signature */
#signature {
    margin-top: 30px;
    font-size: 1.5em;
    font-weight: bold;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4b7d;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4b7d;
    color: white;
    transform: scale(1.1);
}

#loveMsg {
    display: none;
    font-size: 2em;
    margin-top: 20px;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -50px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday Rimjhim 🎉</h1>

    <div id="typeText"></div>

    <div id="personalMsg">
        On your special day, I just want you to know how much you mean to me.
        You are the most beautiful part of my life, and every moment with you
        feels like a dream come true. I am so lucky to have you. ❤️
    </div>

    <button onclick="showLove()">Click for Surprise 💖</button>

    <div id="loveMsg">I LOVE YOU SWEETHEART 💕</div>

    <div id="signature">
        — Yours forever, <br> by janu ❤️
    </div>
</div>

<script>
// Typewriter text
const text = "You are my happiness, my smile, my everything ❤️";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typeText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}
typing();

// Show love
function showLove() {
    document.getElementById("loveMsg").style.display = "block";
}

// Floating hearts
function createHearts() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHearts, 300);
</script>

</body>
</html>
